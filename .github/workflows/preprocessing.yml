name: Automated Data Preprocessing

on:
  push:
    branches: [main]
    paths:
      - "adult_raw/**"
      - "preprocessing/automate_Gilang-Swandaru.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run automated preprocessing
        working-directory: preprocessing
        run: |
          python automate_Gilang-Swandaru.py \
            --data_path ../adult_raw/adult.csv \
            --save_path adult_preprocessing

      - name: Commit and push preprocessed dataset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/adult_preprocessing
          git diff --cached --quiet || git commit -m "chore: auto-update preprocessed dataset [skip ci]"
          git push